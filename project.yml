name: WallOut
options:
  bundleIdPrefix: fr.picklestudio
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  groupSortPosition: none

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  WallOut:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: WallOut
        excludes:
          - "**/*.md"
    info:
      path: WallOut/Info.plist
      properties:
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleDisplayName: WallOut
        CFBundleName: WallOut
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: WallOut/WallOut.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.picklestudio.WallOut
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: WallOut/Info.plist
        CODE_SIGN_ENTITLEMENTS: WallOut/WallOut.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: AppKit.framework
      - sdk: ServiceManagement.framework

  WallOutTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - WallOutTests
    dependencies:
      - target: WallOut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.picklestudio.WallOutTests
